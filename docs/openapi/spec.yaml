openapi: 3.1.0
info:
  title: Freelo (Escala Fácil) API
  description: Backend API for the Freelo event staff management platform.
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [ADMIN, COMPANY, WORKER, COORDINATOR, PROMOTER] }

    Worker:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        cpf: { type: string }
        phone: { type: string }
        role: { type: string }
        xp: { type: integer }
        rating: { type: number, format: float }
        verified: { type: boolean }
        skills: { type: array, items: { type: string } }

    Job:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        price: { type: number }
        date: { type: string, format: date-time }
        location: { type: string }
        spots: { type: integer }
        category: { type: string }

paths:
  /api/auth/login:
    post:
      summary: Authenticate user
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  refreshToken: { type: string }
                  user: { $ref: '#/components/schemas/User' }

  /api/jobs:
    get:
      summary: List available jobs
      tags: [Jobs]
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: location
          in: query
          schema: { type: string }
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Job' }

    post:
      summary: Create a new job
      tags: [Jobs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Job' }
      responses:
        '201':
          description: Job created

  /api/applications:
    post:
      summary: Apply for a job
      tags: [Applications]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobId: { type: string, format: uuid }
      responses:
        '201':
          description: Application submitted

  /api/wallet:
    get:
      summary: Get wallet balance and transactions
      tags: [Wallet]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Wallet data
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance: { type: number }
                  transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        amount: { type: number }
                        type: { type: string }
                        date: { type: string, format: date-time }
