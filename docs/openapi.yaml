# Projeto: Freelo
# Responsável: Lucas Moreira - Engenheiro de Software / Arquiteto de Software
# ---
openapi: 3.0.0
info:
  title: Freelo API
  description: API para a plataforma de gestão de equipes de eventos baseada em 8 módulos core.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Servidor de Desenvolvimento Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [WORKER, COMPANY, COORDINATOR, PROMOTER] }

    Job:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        price: { type: number }
        date: { type: string, format: date-time }

paths:
  # MODULE: Auth
  /auth/login:
    post:
      summary: Autenticação de usuário
      tags: [Auth]
      responses: { '200': { description: OK } }
  
  /auth/register:
    post:
      summary: Registro de novo usuário
      tags: [Auth]
      responses: { '201': { description: Criado } }

  # MODULE: Users
  /users/profile:
    get:
      summary: Retorna perfil do usuário logado
      tags: [Users]
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: OK } }

  # MODULE: Jobs
  /jobs:
    get:
      summary: Lista vagas de emprego
      tags: [Jobs]
      responses: { '200': { description: OK } }
    post:
      summary: Cria nova vaga (Company)
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      responses: { '201': { description: Criada } }

  /jobs/{id}/apply:
    post:
      summary: Candidatar-se a uma vaga (Worker)
      tags: [Jobs]
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: OK } }

  # MODULE: Events
  /events:
    get:
      summary: Lista eventos da empresa
      tags: [Events]
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: OK } }

  # MODULE: Wallet
  /wallet/balance:
    get:
      summary: Saldo e extrato financeiro
      tags: [Wallet]
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: OK } }

  # MODULE: Chat
  /chat/messages:
    get:
      summary: Lista conversas ativas
      tags: [Chat]
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: OK } }

  # MODULE: Notifications
  /notifications:
    get:
      summary: Lista notificações do usuário
      tags: [Notifications]
      security: [{ bearerAuth: [] }]
      responses: { '200': { description: OK } }

  # MODULE: Reviews
  /reviews:
    post:
      summary: Avaliar profissional ou empresa
      tags: [Reviews]
      security: [{ bearerAuth: [] }]
      responses: { '201': { description: Criada } }
