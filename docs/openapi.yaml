# Projeto: Freelo
# Responsável: Lucas Moreira - Engenheiro de Software / Arquiteto de Software
# ---
openapi: 3.0.0
info:
  title: Freelo API
  description: API para a plataforma de gestão de equipes de eventos. Responsável Lucas Moreira.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Servidor de Desenvolvimento Local

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        role: { type: string, enum: [WORKER, COMPANY, COORDINATOR, PROMOTER, ADMIN] }

    Job:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        price: { type: number }
        date: { type: string, format: date-time }
        location: { type: string }
        category: { type: string }

paths:
  /auth/login:
    post:
      summary: Realiza o login do usuário.
      tags: [Auth]
      responses:
        '200':
          description: OK
  
  /auth/register:
    post:
      summary: Cadastra um novo usuário.
      tags: [Auth]
      responses:
        '201':
          description: Criado

  /jobs:
    get:
      summary: Lista vagas disponíveis.
      tags: [Jobs]
      responses:
        '200':
          description: Lista de vagas
    post:
      summary: Cria uma nova vaga.
      tags: [Jobs]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Criada

  /wallet:
    get:
      summary: Retorna saldo e extrato.
      tags: [Wallet]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados da carteira
